name: Manual Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.4'

      - name: Install MinGW (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install mingw

      - name: Install dependencies
        run: bun install
        working-directory: apps/desktop

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: bun run dist -- --publish always
        working-directory: apps/desktop

      - name: Install Flatpak tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gh
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak bundle
        if: matrix.os == 'ubuntu-latest'
        env:
          RAFFI_FLATPAK_INSTALL_DEPS_FROM: flathub
          RAFFI_FLATPAK_RUNTIME_REPO: https://dl.flathub.org/repo/flathub.flatpakrepo
        run: bash flatpak/build-bundle.sh
        working-directory: apps/desktop

      - name: Upload Flatpak workflow artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: raffi-flatpak-x86_64
          path: apps/desktop/flatpak/artifacts/*.flatpak
          if-no-files-found: error

      - name: Upload Flatpak to GitHub Release
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(bun -e "console.log(require('./package.json').version)")"
          TAG="v${VERSION}"
          gh release view "${TAG}" >/dev/null 2>&1 || gh release create "${TAG}" --title "Raffi ${VERSION}" --notes ""
          gh release upload "${TAG}" flatpak/artifacts/*.flatpak --clobber
        working-directory: apps/desktop
