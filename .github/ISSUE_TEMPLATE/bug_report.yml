name: Bug report
description: Report broken behavior, regressions, crashes, or reliability issues.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this form for broken behavior, regressions, crashes, or reliability problems.
        Search existing issues first and keep the report focused on one problem.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I included enough detail to reproduce or investigate the problem.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - raffi-desktop/
        - raffi-mobile/
        - raffi-server/
        - Build, CI, or release tooling
        - Not sure
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, deterministic repro.
      placeholder: |
        1. Start the app with ...
        2. Go to ...
        3. Click on ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: You click play, it plays.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: It crashes the app.
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How bad is this in practice?
      options:
        - Blocks watching completely
        - Major degradation or frequent failure
        - Minor bug or occasional failure
        - Cosmetic issue
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release version, commit SHA, or branch name if known.
      placeholder: main @ abc1234

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser or desktop app version.
      placeholder: macOS 15.3, Chrome 135, Bun 1.3.9, ...

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack traces
      description: Paste the most relevant output only. Redact secrets.
      render: shell

  - type: upload
    id: attachments
    attributes:
      label: Screenshots, recordings, or supporting files
      description: Upload screenshots, short recordings, repro archives, or log files.
    validations:
      required: false
      accept: ".png,.jpg,.jpeg,.gif,.webp,.svg,.mp4,.mov,.webm,.log,.txt,.json,.zip"

  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: If you found a temporary workaround, include it.
      placeholder: Restarting the app clears the stuck state.
