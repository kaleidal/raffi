app-id: al.raffi.raffi
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: raffi
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=xdg-videos:ro
  - --filesystem=xdg-download:ro
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

modules:
  - name: raffi
    buildsystem: simple
    build-commands:
      - install -dm755 /app/main
      - cp -R linux-unpacked/. /app/main/
      - mkdir -p /app/bin /app/share/applications /app/share/metainfo /app/share/icons/hicolor/128x128/apps /app/share/icons/hicolor/512x512/apps
      - install -Dm755 run.sh /app/bin/raffi
      - install -Dm644 al.raffi.raffi.desktop /app/share/applications/al.raffi.raffi.desktop
      - install -Dm644 al.raffi.raffi.metainfo.xml /app/share/metainfo/al.raffi.raffi.metainfo.xml
      - install -Dm644 al.raffi.raffi-128.png /app/share/icons/hicolor/128x128/apps/al.raffi.raffi.png
      - install -Dm644 al.raffi.raffi-512.png /app/share/icons/hicolor/512x512/apps/al.raffi.raffi.png
    sources:
      - type: dir
        path: stage/linux-unpacked
        dest: linux-unpacked
      - type: file
        path: run.sh
      - type: file
        path: al.raffi.raffi.desktop
      - type: file
        path: al.raffi.raffi.metainfo.xml
      - type: file
        path: stage/icons/128x128.png
        dest-filename: al.raffi.raffi-128.png
      - type: file
        path: stage/icons/512x512.png
        dest-filename: al.raffi.raffi-512.png
