<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Raffi Cast Receiver</title>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --panel-bg: rgba(12, 14, 18, 0.78);
        --panel-border: rgba(255, 255, 255, 0.1);
        --text-primary: rgba(255, 255, 255, 0.97);
        --text-secondary: rgba(234, 239, 245, 0.68);
        --text-muted: rgba(234, 239, 245, 0.46);
        --track-bg: rgba(255, 255, 255, 0.14);
        --track-fill: linear-gradient(90deg, rgba(255, 255, 255, 0.98) 0%, rgba(213, 221, 231, 0.94) 100%);
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        color: #fff;
        font-family: Inter, Segoe UI, sans-serif;
        overflow: hidden;
      }
      #app {
        position: relative;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      cast-media-player {
        position: absolute;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        --theme-hue: 210;
        --font-family: Poppins, "Segoe UI", sans-serif;
        --background: transparent;
        --background-color: transparent;
        --background-image: none;
        --logo-image: none;
        --splash-image: none;
        --watermark-image: none;
        --playback-logo-image: none;
        --spinner-image: none;
        --buffering-image: none;
        --progress-color: rgba(255, 255, 255, 0.88);
      }
      #hud {
        position: absolute;
        left: 50%;
        bottom: 34px;
        transform: translateX(-50%);
        width: min(980px, calc(100vw - 64px));
        padding: 20px 22px 18px;
        border-radius: 28px;
        border: 1px solid var(--panel-border);
        background: var(--panel-bg);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
        pointer-events: none;
        box-sizing: border-box;
        z-index: 2;
      }
      #panelTop {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }
      #meta {
        display: flex;
        flex-direction: column;
        gap: 7px;
        min-width: 0;
      }
      #eyebrowRow {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      #eyebrow {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: var(--text-muted);
        white-space: nowrap;
      }
      #dot {
        width: 5px;
        height: 5px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.22);
        flex: 0 0 auto;
      }
      #mediaType {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: var(--text-muted);
        white-space: nowrap;
      }
      #title {
        font-size: 29px;
        font-weight: 700;
        line-height: 1.08;
        letter-spacing: -0.03em;
        color: var(--text-primary);
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.32);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #subtitle {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-secondary);
        min-height: 20px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #statusGroup {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 0 0 auto;
      }
      #statusBadge {
        position: static;
        padding: 9px 13px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text-primary);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      #statusBadge[data-state="buffering"] {
        background: rgba(255, 211, 102, 0.14);
        color: rgba(255, 234, 184, 0.98);
      }
      #statusBadge[data-state="paused"] {
        background: rgba(173, 181, 189, 0.14);
        color: rgba(236, 240, 244, 0.92);
      }
      #statusBadge[data-state="playing"] {
        background: rgba(134, 239, 172, 0.12);
        color: rgba(214, 255, 224, 0.98);
      }
      #timeline {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      #progressTrack {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: var(--track-bg);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }
      #progressFill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: var(--track-fill);
        transform-origin: left center;
        box-shadow: 0 0 18px rgba(255, 255, 255, 0.28);
      }
      #timeRow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 17px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        color: var(--text-primary);
      }
      .timeValue {
        min-width: 84px;
      }
      #bufferingHint {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        opacity: 0;
        transform: translateY(6px);
        transition: opacity 180ms ease, transform 180ms ease;
      }
      #bufferingHint.visible {
        opacity: 1;
        transform: translateY(0);
      }
      @media (max-width: 900px) {
        #hud {
          width: calc(100vw - 36px);
          padding: 18px 18px 16px;
          border-radius: 24px;
          bottom: 18px;
        }
        #panelTop {
          gap: 14px;
        }
        #title {
          font-size: 24px;
        }
        #subtitle {
          font-size: 14px;
        }
        #timeRow {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <cast-media-player></cast-media-player>
      <div id="hud">
        <div id="panelTop">
          <div id="meta">
            <div id="eyebrowRow">
              <div id="eyebrow">Casting to TV</div>
              <div id="dot"></div>
              <div id="mediaType">Video</div>
            </div>
            <div id="title">Raffi</div>
            <div id="subtitle"></div>
          </div>
          <div id="statusGroup">
            <div id="bufferingHint">Stabilizing stream</div>
            <div id="statusBadge" data-state="loading">Loading</div>
          </div>
        </div>
        <div id="timeline">
          <div id="progressTrack"><div id="progressFill"></div></div>
          <div id="timeRow">
            <div id="currentTime" class="timeValue">0:00</div>
            <div id="duration" class="timeValue" style="text-align:right">0:00</div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const context = cast.framework.CastReceiverContext.getInstance();
      const playerManager = context.getPlayerManager();
      const playerElement = document.querySelector("cast-media-player");
      const titleElement = document.getElementById("title");
      const subtitleElement = document.getElementById("subtitle");
      const currentTimeElement = document.getElementById("currentTime");
      const durationElement = document.getElementById("duration");
      const progressFillElement = document.getElementById("progressFill");
      const statusBadgeElement = document.getElementById("statusBadge");
      const bufferingHintElement = document.getElementById("bufferingHint");
      const mediaTypeElement = document.getElementById("mediaType");
      const supportedCommands =
        cast.framework.messages.Command.PAUSE |
        cast.framework.messages.Command.SEEK;
      let knownDurationSeconds = 0;
      let appliedDurationSeconds = 0;
      let lastDisplayTimeSeconds = 0;
      let lastDisplayTimeAtMs = Date.now();
      let lastProgressAtMs = 0;
      let lastWaitingAtMs = 0;
      let lastSmoothedState = "loading";
      let hasPlaybackStarted = false;

      const formatTime = (value) => {
        const totalSeconds = Math.max(0, Math.floor(Number(value || 0)));
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (hours > 0) {
          return `${hours}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
        }
        return `${minutes}:${String(seconds).padStart(2, "0")}`;
      };

      const updateDisplayClock = (nextTime, isAdvancing) => {
        const normalizedTime = Math.max(0, Number(nextTime || 0));
        const now = Date.now();
        if (isAdvancing && normalizedTime > lastDisplayTimeSeconds + 0.05) {
          lastProgressAtMs = now;
        }
        if (
          normalizedTime > lastDisplayTimeSeconds + 0.05 ||
          normalizedTime < lastDisplayTimeSeconds - 2 ||
          !hasPlaybackStarted ||
          !isAdvancing
        ) {
          lastDisplayTimeSeconds = normalizedTime;
        }
        lastDisplayTimeAtMs = now;
        if (normalizedTime > 0.05) {
          hasPlaybackStarted = true;
        }
      };

      const getSmoothedState = (playerState, currentTime) => {
        const now = Date.now();
        const state = String(playerState || "").toUpperCase();
        const recentlyAdvanced = now - lastProgressAtMs < 2200;
        const recentlyWaited = now - lastWaitingAtMs < 1400;

        if (state === "PAUSED") {
          lastSmoothedState = "paused";
          return lastSmoothedState;
        }

        if (recentlyAdvanced || (currentTime > 0 && !recentlyWaited && state !== "IDLE" && state !== "LOADING")) {
          lastSmoothedState = "playing";
          return lastSmoothedState;
        }

        if (recentlyWaited || state === "BUFFERING" || state === "LOADING") {
          lastSmoothedState = "buffering";
          return lastSmoothedState;
        }

        if (state === "PLAYING") {
          lastSmoothedState = "playing";
          return lastSmoothedState;
        }

        return lastSmoothedState || "loading";
      };

      const syncHud = () => {
        const mediaInformation = playerManager.getMediaInformation();
        const metadata = mediaInformation?.metadata || {};
        const title = String(metadata?.title || mediaInformation?.contentId || "Raffi");
        const subtitle = String(metadata?.subtitle || "");
        const playerCurrentTime = Number(playerManager.getCurrentTimeSec() || 0);
        const currentTime = Number.isFinite(playerCurrentTime) ? playerCurrentTime : 0;
        const playerDuration = Number(playerManager.getDurationSec() || 0);
        const mediaInfoDuration = Number(mediaInformation?.duration || 0);
        const activeDuration = Number.isFinite(playerDuration) && playerDuration > 0
          ? playerDuration
          : Number.isFinite(mediaInfoDuration) && mediaInfoDuration > 0
            ? mediaInfoDuration
            : knownDurationSeconds;
        const durationSeconds = Number.isFinite(activeDuration) && activeDuration > 0
          ? activeDuration
          : 0;
        const ratio = durationSeconds > 0
          ? Math.max(0, Math.min(1, currentTime / durationSeconds))
          : 0;
        const playerState = String(playerManager.getPlayerState() || "IDLE").toUpperCase();
        const smoothedState = getSmoothedState(playerState, currentTime);

        updateDisplayClock(currentTime, smoothedState === "playing");

        const displayedTime = smoothedState === "playing" && hasPlaybackStarted
          ? Math.max(lastDisplayTimeSeconds, currentTime)
          : currentTime;
        const displayedRatio = durationSeconds > 0
          ? Math.max(0, Math.min(1, displayedTime / durationSeconds))
          : ratio;

        titleElement.textContent = title;
        subtitleElement.textContent = subtitle;
        mediaTypeElement.textContent = subtitle ? "Episode" : "Movie";
        currentTimeElement.textContent = formatTime(displayedTime);
        durationElement.textContent = formatTime(durationSeconds);
        progressFillElement.style.width = `${displayedRatio * 100}%`;
        statusBadgeElement.dataset.state = smoothedState;
        statusBadgeElement.textContent =
          smoothedState === "buffering" ? "Buffering" :
          smoothedState === "paused" ? "Paused" :
          smoothedState === "playing" ? "Playing" :
          "Loading";
        bufferingHintElement.classList.toggle("visible", smoothedState === "buffering");
      };

      const syncHudFromClock = () => {
        const mediaInformation = playerManager.getMediaInformation();
        const playerDuration = Number(playerManager.getDurationSec() || 0);
        const mediaInfoDuration = Number(mediaInformation?.duration || 0);
        const durationSeconds = Number.isFinite(playerDuration) && playerDuration > 0
          ? playerDuration
          : Number.isFinite(mediaInfoDuration) && mediaInfoDuration > 0
            ? mediaInfoDuration
            : knownDurationSeconds;
        const now = Date.now();
        const elapsedSeconds = Math.max(0, (now - lastDisplayTimeAtMs) / 1000);
        const canAdvance = lastSmoothedState === "playing" && now - lastProgressAtMs < 2200;
        const nextTime = canAdvance
          ? lastDisplayTimeSeconds + elapsedSeconds
          : lastDisplayTimeSeconds;
        const clampedTime = durationSeconds > 0 ? Math.min(nextTime, durationSeconds) : nextTime;
        const ratio = durationSeconds > 0
          ? Math.max(0, Math.min(1, clampedTime / durationSeconds))
          : 0;

        currentTimeElement.textContent = formatTime(clampedTime);
        durationElement.textContent = formatTime(durationSeconds);
        progressFillElement.style.width = `${ratio * 100}%`;
      };

      const syncDuration = (nextDurationSeconds) => {
        const normalizedDuration = Number(nextDurationSeconds || 0);
        if (!Number.isFinite(normalizedDuration) || normalizedDuration <= 0) {
          return;
        }

        knownDurationSeconds = normalizedDuration;
        const mediaInformation = playerManager.getMediaInformation();
        if (!mediaInformation) {
          return;
        }

        const currentMediaDuration = Number(mediaInformation.duration || 0);
        if (
          Math.abs(normalizedDuration - currentMediaDuration) < 0.01 &&
          Math.abs(normalizedDuration - appliedDurationSeconds) < 0.01
        ) {
          return;
        }

        mediaInformation.streamType = cast.framework.messages.StreamType.BUFFERED;
        mediaInformation.duration = normalizedDuration;
        mediaInformation.customData = {
          ...(mediaInformation.customData || {}),
          durationSeconds: normalizedDuration,
        };
        appliedDurationSeconds = normalizedDuration;
        playerManager.setMediaInformation(mediaInformation, true);
        playerManager.broadcastStatus(true);
        syncHud();
      };

      const basePlaybackConfig = Object.assign(
        new cast.framework.PlaybackConfig(),
        playerManager.getPlaybackConfig() || {},
      );
      basePlaybackConfig.autoResumeNumberOfSegments = 2;
      playerManager.setPlaybackConfig(basePlaybackConfig);

      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        (request) => {
          if (request.media) {
            request.media.streamType = cast.framework.messages.StreamType.BUFFERED;
            const requestedDuration = Number(
              request.media.customData?.durationSeconds || request.media.duration || 0,
            );
            if (Number.isFinite(requestedDuration) && requestedDuration > 0) {
              knownDurationSeconds = requestedDuration;
              request.media.duration = requestedDuration;
              request.media.customData = {
                ...(request.media.customData || {}),
                durationSeconds: requestedDuration,
              };
            }
          }
          syncHud();
          return request;
        },
      );

      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.SEEK,
        (request) => request,
      );

      playerManager.addEventListener(
        cast.framework.events.EventType.MEDIA_STATUS,
        () => {
          const mediaDuration = Number(playerManager.getDurationSec() || 0);
          if (Number.isFinite(mediaDuration) && mediaDuration > 0) {
            syncDuration(mediaDuration);
          } else {
            syncDuration(knownDurationSeconds);
          }
          syncHud();
        },
      );

      if (playerElement) {
        playerElement.style.setProperty("--background", "transparent");
        playerElement.style.setProperty("--background-color", "transparent");
      }

      context.start({
        disableIdleTimeout: true,
        enforceSupportedCommands: true,
        supportedCommands,
      });

      playerManager.setSupportedMediaCommands(supportedCommands, true);

      setInterval(() => {
        const mediaDuration = Number(playerManager.getDurationSec() || 0);
        const playerState = String(playerManager.getPlayerState() || "").toUpperCase();
        const currentTime = Number(playerManager.getCurrentTimeSec() || 0);
        if (Number.isFinite(mediaDuration) && mediaDuration > 0) {
          syncDuration(mediaDuration);
        } else {
          syncDuration(knownDurationSeconds);
        }
        if (playerState === "BUFFERING" || playerState === "LOADING") {
          lastWaitingAtMs = Date.now();
        }
        if (Number.isFinite(currentTime) && currentTime > lastDisplayTimeSeconds + 0.05) {
          lastProgressAtMs = Date.now();
        }
        syncHud();
      }, 1000);

      setInterval(() => {
        syncHudFromClock();
      }, 250);

      syncHud();
    </script>
  </body>
</html>
